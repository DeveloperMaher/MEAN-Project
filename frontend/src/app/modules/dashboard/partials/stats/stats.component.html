
<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
    <div class="dark:bg-gray-700 p-6 rounded-xl shadow-sm border border-gray-100">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-sm dark:text-gray-50 text-gray-500 font-medium">All Tasks</p>
                <h3 class="text-2xl font-bold dark:text-gray-50 text-gray-800 mt-1">
                {{ tasks.length }}
                </h3>
            </div>
            <div class="p-2 bg-blue-200 text-blue-600 rounded-lg">
                <i class="fas fa-clipboard-list"></i>
            </div>
        </div>
    </div>
    <div class="dark:bg-gray-700 p-6 rounded-xl shadow-sm border border-gray-100">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-sm dark:text-gray-50 text-gray-500 font-medium">Pending</p>
                <h3 class="text-2xl font-bold dark:text-gray-50 text-gray-800 mt-1" id="openTasks">
                {{pendingTasks}}
                </h3>
            </div>
            <div class="p-2 bg-yellow-200 text-yellow-600 rounded-lg">
            <i class="fas fa-clock"></i>
        </div>
        </div>
    </div>
    <div class="dark:bg-gray-700 p-6 rounded-xl shadow-sm border border-gray-100">
        <div class="flex justify-between items-start">
        <div>
            <p class="text-sm dark:text-gray-50 text-gray-500 font-medium">In Progress</p>
            <h3 class="text-2xl font-bold dark:text-gray-50 text-gray-800 mt-1" id="progressTasks">
            {{ inProgressTasks }}
            </h3>
        </div>
        <div class="p-2 bg-purple-300 text-purple-600 rounded-lg">
            <i class="fas fa-spinner"></i>
        </div>
        </div>
    </div>
    <div class="dark:bg-gray-700 p-6 rounded-xl shadow-sm border border-gray-100">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-sm dark:text-gray-50 text-gray-500 font-medium">Done</p>
                <h3 class="text-2xl font-bold dark:text-gray-50 text-gray-800 mt-1" id="doneTasks">
                {{ doneTasks }}
                </h3>
            </div>
            <div class="p-2 bg-green-200 text-green-600 rounded-lg">
                <i class="fas fa-check-circle"></i>
            </div>
        </div>
    </div>
</div>
