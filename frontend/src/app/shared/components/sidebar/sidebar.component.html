  <div
    *ngIf="isOpen$ | async"
    class="fixed inset-0 bg-black/50 z-40 md:hidden"
    (click)="closeSidebar()"
  ></div>
  <!-- Sidebar -->
  <aside 
    [class.translate-x-0]="isOpen$ | async"
    [class.-translate-x-full]="!(isOpen$ | async)"
    class="fixed md:static top-0 left-0 h-full w-60 bg-slate-900 text-white flex flex-col shadow-xl z-50 transform transition-transform duration-300 md:translate-x-0">
    <div class="p-6 flex items-center space-x-3 border-b border-slate-700">
      <div class="flex items-center space-x-3">
        <img src="https://ui-avatars.com/api/?name=Task+Management&background=3b82f6&color=fff" alt="Admin" class="w-10 h-10 rounded-full border-2 border-slate-600">
        <div>
          <p class="text-sm font-semibold">{{userName}}</p>
          <p class="text-xs text-gray-400">{{userEmail}}</p>
        </div>
      </div>
    </div>
    
    <nav class="flex-1 py-6 space-y-1">
      <a (click)="closeSidebar()" 
          [routerLink]="isAdmin() ? '/dashboard' : '/user-dashboard'"
          routerLinkActive="bg-blue-500 text-white border-l-4 border-blue-300" [routerLinkActiveOptions]="{ exact: true }" class="sidebar-link flex items-center px-6 py-2 text-gray-300 transition-colors">
        <i class="fas fa-tachometer-alt w-6"></i>
        <span class="font-medium ml-2">Dashboard</span>
      </a>
      <a (click)="closeSidebar()" 
        [routerLink]="isAdmin() ? '/dashboard/tasks' : '/user-dashboard/usertasks'"
        routerLinkActive="bg-blue-500 text-white border-l-4 border-blue-300" [routerLinkActiveOptions]="{ exact: true }" class="sidebar-link flex items-center px-6 py-2 text-gray-300 transition-colors">
        <i class="fas fa-tasks w-6"></i>
        <span class="font-medium ml-2">All Tasks</span>
      </a>
      <a *ngIf="isAdmin() && (showArchived$ | async)" 
        (click)="closeSidebar()" 
        routerLink="/dashboard/archived" 
        routerLinkActive="bg-blue-500 text-white border-l-4 border-blue-300" [routerLinkActiveOptions]="{ exact: true }" class="sidebar-link flex items-center px-6 py-2 text-gray-300 transition-colors">
        <i class="fas fa-archive w-6"></i>
        <span class="font-medium ml-2">Archived Tasks</span>
      </a>
      <a *ngIf="isAdmin()" (click)="closeSidebar()" 
        routerLink="/dashboard/users" 
        routerLinkActive="bg-blue-500 text-white border-l-4 border-blue-300" [routerLinkActiveOptions]="{ exact: true }" class="sidebar-link flex items-center px-6 py-2 text-gray-300 transition-colors">
        <i class="fas fa-users w-6"></i>
        <span class="font-medium ml-2">Users</span>
      </a>
      <a (click)="closeSidebar()" 
        [routerLink]="isAdmin() ? '/dashboard/settings' : '/user-dashboard/settings'" 
        routerLinkActive="bg-blue-500 text-white border-l-4 border-blue-300" [routerLinkActiveOptions]="{ exact: true }"  class="sidebar-link flex items-center px-6 py-2 text-gray-300 transition-colors">
        <i class="fas fa-cog w-6"></i>
        <span class="font-medium ml-2">Settings</span>
      </a>
    </nav>
    
    <div class="p-4 border-t flex items-center space-x-3 border-slate-700">
      <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
        <i class="fas fa-sign-out  text-white"></i>
      </div>
      <div class="text-sm font-semibold">
        <button (click)="logout()" class="text-white">Logout</button>
      </div>
    </div>
  </aside>
